<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Sales</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>📅 RESERVA DE SALES</h2>
        
        <button onclick="activaAdmin()" style="background:none; border:none; font-size:10px; color:#ccc; cursor:pointer; width:100%; margin-bottom: 10px;">Admin</button>
        
        <nav class="tabs">
            <button class="tab tab-gran active" onclick="changeRoom('gran')">SALA GRAN</button>
            <button class="tab tab-lila" onclick="changeRoom('lila')">SALA LILA</button>
            <button class="tab tab-groga" onclick="changeRoom('groga')">SALA GROGA</button>
            <button class="tab tab-blava" onclick="changeRoom('blava')">SALA BLAVA</button>
        </nav>

        <div class="booking-form">
            <input type="text" id="user-name" placeholder="El teu nom...">
            <input type="text" id="activity" placeholder="Què fareu? (ex: Dansa)">
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label style="font-size: 12px; color: #64748b;">Inici:</label>
                    <select id="start-time"></select>
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 12px; color: #64748b;">Fi:</label>
                    <select id="end-time"></select>
                </div>
            </div>

            <label style="font-size: 12px; color: #64748b; display: block; margin-top: 10px;">Data:</label>
            <input type="date" id="booking-date" onchange="changeDate()">
            
            <button id="btn-reservar" onclick="makeBooking()">Confirmar Reserva</button>
        </div>

        <h3 id="room-title" style="text-align: center; color: #64748b; text-transform: uppercase;">Sala GRAN</h3>
        
        <div id="schedule"></div>
    </div>

    <script src="script.js" type="module"></script>
